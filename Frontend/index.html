<!DOCTYPE html>
<html>
<head>
  <title>Task App</title>
</head>
<body>

  <h2>Register</h2>
  <input id="rname" placeholder="Name"><br>
  <input id="remail" placeholder="Email"><br>
  <input id="rpassword" placeholder="Password"><br>
  <button onclick="register()">Register</button>

  <h2>Login</h2>
  <input id="lemail" placeholder="Email"><br>
  <input id="lpassword" placeholder="Password"><br>
  <button onclick="login()">Login</button>

  <h2>Add Task</h2>
  <input id="task" placeholder="Enter task"><br>
  <button id="addBtn" onclick="addTask()" disabled>Add Task</button>

  <h2>Tasks</h2>
  <button onclick="getTasks()">Get Tasks</button>
  <ul id="list"></ul>

<script>
let token = "";

// REGISTER
async function register() {
  await fetch("http://localhost:5000/auth/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: rname.value,
      email: remail.value,
      password: rpassword.value
    })
  });
  alert("Registered");
}

// LOGIN
async function login() {
  const res = await fetch("http://localhost:5000/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: lemail.value,
      password: lpassword.value
    })
  });

  const data = await res.json();
  token = data.token;
  alert("Login success");
}

// ENABLE BUTTON ONLY WHEN TEXT ENTERED
task.addEventListener("input", () => {
  addBtn.disabled = task.value.trim() === "";
});

// ADD TASK
async function addTask() {
  if (task.value.trim() === "") {
    alert("Enter task first");
    return;
  }

  await fetch("http://localhost:5000/tasks", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      title: task.value
    })
  });

  alert("Task added");
  task.value = "";
  addBtn.disabled = true;
}

// GET TASKS
async function getTasks() {
  const res = await fetch("http://localhost:5000/tasks", {
    headers: {
      "Authorization": token
    }
  });

  const data = await res.json();

  list.innerHTML = "";
  data.forEach(t => {
    const li = document.createElement("li");
    li.innerText = t.title;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
